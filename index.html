<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔗 BLiPP WROOM Dashboard</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
:root {
    --accent: #00ff88;
    --accent-glow: rgba(0, 255, 136, 0.3);
    --blue: #00d4ff;
    --danger: #ff4444;
    --glass: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.1);
}

body.mode-wifi { --accent: #00ff88; --accent-glow: rgba(0, 255, 136, 0.3); }
body.mode-cloud { --accent: #a855f7; --accent-glow: rgba(168, 85, 247, 0.3); }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
}

.header {
    position:fixed; top:0; width:100%;
    padding: 15px 25px;
    display:flex; justify-content:space-between; align-items:center;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
}

.logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 8px; font-weight: 900; color: #0f172a;
    margin-right: 10px; box-shadow: 0 0 15px var(--accent-glow);
}

.title { font-weight:900; color: var(--accent); font-size: 1.3rem; display: flex; align-items: center; }

#loginOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(15, 23, 42, 0.8);
    backdrop-filter: blur(30px);
    z-index: 2000;
    display: flex; align-items: center; justify-content: center;
}

.login-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 50px 40px; border-radius: 40px;
    border: 1px solid var(--border);
    text-align: center; width: 90%; max-width: 440px;
}

.login-input {
    width: 100%; padding: 18px 25px; margin-bottom: 15px;
    border-radius: 18px; border: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.9);
    color: #0f172a; font-weight: 600; outline: none;
}

.login-btn {
    width: 100%; padding: 20px; border-radius: 20px;
    border: none; background: var(--accent); color: #0f172a;
    font-size: 1.1rem; font-weight: 800; cursor: pointer;
}

.dashboard { padding: 100px 20px 40px; max-width: 1000px; margin: 0 auto; }

.statusBox { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

.card {
    background: var(--glass);
    border: 1px solid var(--border);
    padding: 20px 10px;
    border-radius: 20px;
    text-align: center;
}

.card b { display: block; margin-top: 8px; font-size: 1.3rem; color: var(--blue); }

.controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 25px; }

.ctrl-btn {
    padding: 18px;
    border: none;
    border-radius: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.2s ease;
}

.ctrl-btn.pressed {
    transform: scale(0.96);
}

.btn { background: var(--accent); color: #0f172a; }
.btnBlue { background: var(--blue); color: #0f172a; }
.btnDanger { background: var(--danger); color: white; }

#map { height: 400px; width: 100%; margin-top: 25px; border-radius: 24px; border: 1px solid var(--border); }

.marker {
    position: relative;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border: 3px solid white;
    border-radius: 50%;
    box-shadow: 0 0 15px var(--accent-glow);
}

/* pulse ring */
.marker::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 18px;
    height: 18px;
    background: var(--accent);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.6;
    z-index: -1;
    animation: pulseRing 1.6s infinite;
}

@keyframes pulseRing {
    0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.6;
    }
    70% {
        transform: translate(-50%, -50%) scale(3.2);
        opacity: 0;
    }
    100% {
        opacity: 0;
    }
}


#toast {
    position: fixed; bottom: 40px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 68, 68, 0.9);
    padding: 14px 28px;
    border-radius: 50px;
    font-weight: 700;
    z-index: 3000;
    display: none;
}

.mode button {
    padding: 8px 16px;
    border:none;
    border-radius:12px;
    background: #1e293b;
    color: #94a3b8;
    font-size: 0.75rem;
    font-weight: 600;
    cursor:pointer;
}

.mode .active { background: var(--accent); color: #0f172a; }

.status {
    font-size: 0.75rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
}

.dot {
    width:12px;
    height:12px;
    border-radius:50%;
    background: var(--danger);
}

.dot.connected { background: var(--accent); }

@media (max-width: 600px) {
    .statusBox, .controls { grid-template-columns: repeat(2, 1fr); }
    #map { height: 320px; }
}

/* ===============================
   SAFE UI ENHANCEMENT PACK
   (ADD ONLY - NO BREAKING CHANGES)
================================= */

/* GLOBAL SMOOTHNESS (safe override layer only) */
button, .ctrl-btn, .mode button, .card {
    transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
}

/* ================= BUTTON HOVER ================= */
.ctrl-btn:hover {
    transform: translateY(-3px) scale(1.02);
    filter: brightness(1.15);
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

.ctrl-btn:active {
    transform: scale(0.95);
}

/* ================= MODE BUTTONS ================= */
.mode button:hover {
    transform: translateY(-2px);
    filter: brightness(1.2);
}

.mode .active {
    box-shadow: 0 0 18px var(--accent-glow);
}

/* ================= CARD EFFECTS ================= */
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 22px rgba(0,0,0,0.25);
}

/* ================= LOGIN ANIMATION ================= */
.login-card {
    animation: blippFadeIn 0.35s ease;
}

@keyframes blippFadeIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
}

/* ================= MAP FADE ================= */
#map {
    animation: blippMapIn 0.5s ease;
}

@keyframes blippMapIn {
    from { opacity: 0.7; }
    to { opacity: 1; }
}

/* ================= CLICK RIPPLE EFFECT ================= */
.ctrl-btn {
    position: relative;
    overflow: hidden;
}

.ctrl-btn::after {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%;
    transform: scale(0);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.4s ease, opacity 0.6s ease;
    top: 50%;
    left: 50%;
    transform-origin: center;
}

.ctrl-btn:active::after {
    transform: scale(2.5);
    opacity: 0;
    transition: 0s;
}

/* ================= EXTRA POLISH ================= */
.header, .dashboard {
    transition: all 0.3s ease;
}
</style>
</head>

<body class="mode-wifi">

<div id="toast">⚠️ PLEASE CONNECT DEVICE FIRST</div>

<div id="loginOverlay">
    <div class="login-card">
        <div style="width:60px;height:60px;background:var(--accent);color:#0f172a;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;border-radius:15px;margin:0 auto 30px;">B</div>
        <h2>BLiPP Dashboard</h2>
        <p style="margin-bottom:20px; opacity:0.7;">Sign-in to access telemetry</p>
        <input type="email" id="userIn" class="login-input" placeholder="Email Address">
        <input type="password" id="passIn" class="login-input" placeholder="Password">
        <button class="login-btn" onclick="validate()">Unlock Dashboard</button>
        <p id="err" style="color:var(--danger); margin-top:15px; display:none;">Invalid Credentials</p>
    </div>
</div>

<div class="header">
  <div class="title"><div class="logo-icon">B</div> BLiPP</div>

  <div class="mode">
    <button id="wifiBtn" class="active">WiFi</button>
    <button id="cloudBtn">Cloud</button>
  </div>

  <div class="status">
    <div id="dot" class="dot"></div>
    <span id="conn">OFFLINE</span>
  </div>
</div>

<div class="dashboard">
    <div class="statusBox">
      <div class="card">🔋 Battery<b id="battery">--%</b></div>
      <div class="card">🚨 Alert<b id="alert">--</b></div>
      <div class="card">⚡ Power<b id="power">--</b></div>
      <div class="card">💡 LED<b id="led">--</b></div>
      <div class="card">🛰️ GPS<b id="gpsStatus">--</b></div>
      <div class="card">📡 Sat<b id="sat">0</b></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn" id="btnBEEP" onclick="sendCmd('BEEP')">BEEP</button>
      <button class="ctrl-btn btnBlue" id="btnSTATUS" onclick="sendCmd('STATUS')">STATUS</button>
      <button class="ctrl-btn btn" id="btnALERT" onclick="sendCmd('TOGGLE_ALERT')">ALERT</button>
      <button class="ctrl-btn btn" id="btnLED" onclick="sendCmd('TOGGLE_LED')">LED</button>
      <button class="ctrl-btn btn" id="btnON" onclick="sendCmd('POWER_ON')">ON</button>
      <button class="ctrl-btn btnDanger" id="btnOFF" onclick="sendCmd('POWER_OFF')">OFF</button>
    </div>

    <div id="map"></div>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyB72VvbasEBY7gPkdplHqUtSbvdFq5pFEs",
    authDomain: "blipp-dashboard.firebaseapp.com",
    databaseURL: "https://blipp-dashboard-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "blipp-dashboard",
    storageBucket: "blipp-dashboard.firebasestorage.app",
    messagingSenderId: "1070434356393",
    appId: "1:1070434356393:web:20c7d1d90d64570e56edb8"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ================= STATE =================
let isConnected = false;
let ws=null, mode="wifi";
let lastLat = 14.5995, lastLng = 120.9842;

let gpsTimeout;
// ================= MAP =================
mapboxgl.accessToken = 'pk.eyJ1IjoiYW5kcmVpcmVpIiwiYSI6ImNtbjhpbmpocjBiMDcydnB3czZpZjVkZHAifQ.GNQE1HYl2fx49aRUEegSAw';

let map = new mapboxgl.Map({
    container:'map',
    style:'mapbox://styles/mapbox/outdoors-v12',
    center:[lastLng,lastLat],
    zoom:14
});

let marker; // only declare

map.on('idle', () => {
    if (marker) return; // prevent duplicate creation

    const el = document.createElement('div');
    el.className = 'marker';

    marker = new mapboxgl.Marker(el, { anchor: 'center' })
    .setLngLat([lastLng, lastLat])
    .addTo(map);
});

// ================= BUTTON ANIMATION =================
document.querySelectorAll('.ctrl-btn').forEach(btn=>{
    btn.addEventListener('mousedown', ()=>btn.classList.add('pressed'));
    btn.addEventListener('mouseup', ()=>btn.classList.remove('pressed'));
    btn.addEventListener('mouseleave', ()=>btn.classList.remove('pressed'));
    btn.addEventListener('touchstart', ()=>btn.classList.add('pressed'));
    btn.addEventListener('touchend', ()=>btn.classList.remove('pressed'));
});

// ================= LOGIN =================
function validate(){
    const u=document.getElementById('userIn').value;
    const p=document.getElementById('passIn').value;

    if(u==="blippdashboard@gmail.com" && p==="blipp1234"){
        document.getElementById('loginOverlay').style.display="none";
        initApp();
    } else {
        document.getElementById('err').style.display="block";
    }
}

function initApp(){
    setMode("cloud");
    startFirebaseSync();

    setTimeout(() => {
        map.resize(); // forces correct Mapbox layout recalculation
    }, 300);
}

// ================= FIREBASE SYNC =================
function startFirebaseSync() {
    const statusRef = database.ref('/blipp_device/latest');
    statusRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            updateStatus(true); 
            if (mode === "cloud") {
                // Update GPS Logic from Firebase
                if(data.lat != null && data.lng != null){
                    smoothMove(data.lat, data.lng);
                    document.getElementById('sat').innerText = data.sat ?? "Cloud";
                    const gs = document.getElementById('gpsStatus');
                    gs.innerText = data.gps_status ?? "Live";
                    gs.style.color = (data.gps_status === "GOOD" || data.gps_status === "LOCKED") ? "#00ff88" : "#a855f7";
                }

                document.getElementById('battery').innerText = Math.round(data.battery) + "%";
                document.getElementById('alert').innerText = data.alert ? "ON" : "OFF";
                document.getElementById('power').innerText = data.powered ? "ON" : "OFF";
                document.getElementById('led').innerText = data.led ? "ON" : "OFF";
            }
        }
    });
}

function smoothMove(lat, lng) {
    if(!lat || !lng) return;
    marker.setLngLat([lng, lat]);
    map.flyTo({ center: [lng, lat], speed: 0.8 });
    lastLat = lat; lastLng = lng;
}

// ================= MODE =================
function setMode(m){
    if(mode===m) return;
    mode=m;

    document.body.className=`mode-${m}`;
    document.querySelectorAll('.mode button').forEach(b=>b.classList.remove('active'));
    document.getElementById(m+"Btn").classList.add('active');

    disconnect();

    if(m==="wifi") connectWiFi();
    else updateStatus(true);
}

document.getElementById('wifiBtn').onclick=()=>setMode("wifi");
document.getElementById('cloudBtn').onclick=()=>setMode("cloud");

// ================= WIFI =================
function connectWiFi(){
    updateStatus("connecting");

    ws=new WebSocket("ws://192.168.4.1:81");

    ws.onopen=()=>updateStatus(true);
    ws.onmessage=(msg)=>handleData(msg.data);
    ws.onclose=()=>{ if(mode==="wifi") setTimeout(connectWiFi,5000); };
}

// ================= COMMAND =================
function sendCmd(cmd){
    if(!isConnected && mode!=="cloud"){ showToast(); return; }

    // ALERT UI FEEDBACK + CONTINUOUS BEEP
    if(cmd==="TOGGLE_ALERT"){
        const a=document.getElementById('alert');
        const btn=document.getElementById('btnALERT');
        const isOn=a.innerText==="ON";

        a.innerText=isOn?"OFF":"ON";
        btn.style.background=isOn?"var(--accent)":"var(--danger)";

        // START / STOP CONTINUOUS BEEP
        // START / STOP CONTINUOUS BEEP
if(!isOn){

    // ✅ FIX: prevent duplicate intervals
    if(window.beepInterval){
        clearInterval(window.beepInterval);
    }

    window.beepInterval = setInterval(()=>{
        if(mode==="cloud"){
            database.ref('/blipp_device/control/command').set("BEEP");
        } else if(ws?.readyState===1){
            ws.send("BEEP");
        }
    }, 800);

} else {
    clearInterval(window.beepInterval);
    window.beepInterval = null; // ✅ reset properly
}
    }

    // LED TOGGLE FIX
    if(cmd==="TOGGLE_LED"){
        const l=document.getElementById('led');
        const btn=document.getElementById('btnLED');
        const isOn=l.innerText==="ON";
        l.innerText=isOn?"OFF":"ON";
        btn.style.background=isOn?"var(--accent)":"var(--blue)";
    }

    // POWER TOGGLE FIX
    if(cmd==="POWER_ON" || cmd==="POWER_OFF"){
        const p=document.getElementById('power');
        const isOn = cmd==="POWER_ON";
        p.innerText = isOn ? "ON" : "OFF";
        document.getElementById('btnON').style.opacity = isOn ? "1" : "0.6";
        document.getElementById('btnOFF').style.opacity = isOn ? "0.6" : "1";
    }

    // STATUS UI FEEDBACK
    if(cmd==="STATUS"){
    const btn=document.getElementById('btnSTATUS');
    const conn=document.getElementById('conn');

    btn.innerText="CHECKING...";
    btn.style.opacity="0.7";

    // simulate status scan delay
    setTimeout(()=>{
        // show connection result
        if(isConnected || mode==="cloud"){
            conn.innerText="CONNECTED";
        } else {
            conn.innerText="OFFLINE";
        }

        btn.innerText="UPDATED";
        
        // revert back
        setTimeout(()=>{
            btn.innerText="STATUS";
            btn.style.opacity="1";
        }, 800);

    }, 700);
}

    if(mode==="cloud"){
        database.ref('/blipp_device/control/command').set(cmd);
    } else if(ws?.readyState===1){
        ws.send(cmd);
    }
}
// ================= DATA =================
function handleData(raw){
    if (mode === "cloud") return;
    let data; try{ data=JSON.parse(raw); }catch{ return; }
    
    // Core GPS Handling Logic
   if (data.type === "gps" || (data.lat != null && data.lng != null)) {

    // clear old timer every new GPS update
    clearTimeout(gpsTimeout);

    smoothMove(data.lat, data.lng);

    document.getElementById('sat').innerText = data.sat ?? "0";

    const gs = document.getElementById('gpsStatus');

    // ✅ define status FIRST
    const status = data.status || data.gps_status || "LOCKED";

    // update text immediately
    gs.innerText = status;

    // update color immediately
    if (status === "GOOD" || status === "LOCKED") {
        gs.style.color = "#00ff88";
    } 
    else if (status === "WEAK") {
        gs.style.color = "#ffcc00";
    } 
    else {
        gs.style.color = "#ff4444";
    }

    // watchdog timeout (device stop detection)
    gpsTimeout = setTimeout(() => {
        gs.innerText = "SEARCHING";
        gs.style.color = "#ff4444";
    }, 5000);
}
    

    if(data.battery!==undefined){
        document.getElementById('battery').innerText=data.battery+"%";
    }

    if(data.alert!==undefined){
        document.getElementById('alert').innerText=data.alert?"ON":"OFF";
    }

    if(data.powered!==undefined){
        document.getElementById('power').innerText=data.powered?"ON":"OFF";
    }

    if(data.led!==undefined){
        document.getElementById('led').innerText=data.led?"ON":"OFF";
    }
}

// ================= STATUS =================
function updateStatus(state){
    const c=document.getElementById('conn');
    const d=document.getElementById('dot');

    if(state==="connecting"){
        c.innerText="LINKING...";
        return;
    }

    isConnected=!!state;
    c.innerText=isConnected?"CONNECTED":"OFFLINE";
    d.classList.toggle("connected",isConnected);
}

function disconnect(){
    if(ws) ws.close();
    isConnected=false;
    updateStatus(false);
}

function showToast(){
    const t=document.getElementById('toast');
    t.style.display="block";
    setTimeout(()=>t.style.display="none",2000);
}
</script>
</body>
</html>
